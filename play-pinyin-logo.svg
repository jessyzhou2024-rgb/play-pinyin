<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Play Pinyin Logo</title>
  <desc id="desc">A cheerful child-friendly Play Pinyin logo with colorful bubble letters, a music note, and a smiling pinyin town mascot.</desc>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#263149" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="sun" x1="0" y1="0" x2="1" y2="1">
